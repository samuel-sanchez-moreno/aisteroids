<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><!-- REPLACE: Report Title --></title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap");

      /* ── Strato Design Tokens ── */
      :root {
        --dt-navy:     #14191f;
        --dt-dark:     #1a1e26;
        --dt-card:     #1e2330;
        --dt-blue:     #1496ff;
        --dt-green:    #73be28;
        --dt-teal:     #00bfb3;
        --dt-purple:   #b4a0ff;
        --dt-orange:   #f5841f;
        --dt-pink:     #ee79a2;
        --dt-red:      #ef4444;
        --dt-white:    #ffffff;
        --dt-gray-100: #f0f2f5;
        --dt-gray-200: #d1d5db;
        --dt-gray-300: #9ca3af;
        --dt-gray-400: #6b7280;
        --dt-gray-500: #374151;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--dt-navy);
        color: var(--dt-white);
        overflow-y: auto;
        min-height: 100vh;
      }

      /* Scroll-snap: progressive enhancement only */
      @supports (scroll-snap-type: y mandatory) {
        html { scroll-snap-type: y proximity; }
        .slide { scroll-snap-align: start; }
      }

      /* No-JS fallback: reveal all animated children immediately, hide nav chrome */
      body.no-js .anim-fade,
      body.no-js .anim-fade-d1,
      body.no-js .anim-fade-d2,
      body.no-js .anim-fade-d3,
      body.no-js .anim-fade-d4 {
        opacity: 1 !important;
        animation: none !important;
        transform: none !important;
      }
      body.no-js .scroll-nav,
      body.no-js .progress,
      body.no-js .slide-counter { display: none !important; }

      /* Reduced motion: disable scroll-snap and animations */
      @media (prefers-reduced-motion: reduce) {
        html { scroll-snap-type: none !important; }
        .slide { scroll-snap-align: none !important; }
        .anim-fade,
        .anim-fade-d1,
        .anim-fade-d2,
        .anim-fade-d3,
        .anim-fade-d4 {
          opacity: 1 !important;
          animation: none !important;
          transform: none !important;
        }
      }

      /* ── AppHeader ── */
      .dt-app-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--dt-dark);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
      }
      .dt-app-header::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--dt-blue), var(--dt-green), var(--dt-teal));
      }
      .dt-app-header-title { font-size: 16px; font-weight: 700; }
      .dt-app-header-meta  { font-size: 12px; color: var(--dt-gray-400); font-family: "DM Mono", monospace; }

      /* ── Page.Main ── */
      .dt-main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 32px 64px;
      }

      /* ── Slide sections (full-viewport-height blocks) ── */
      .slide {
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 64px 0;
        overflow: hidden;
      }
      /* Ambient glow */
      .slide::before {
        content: "";
        position: absolute;
        top: 0; right: 0;
        width: 600px; height: 600px;
        background: radial-gradient(circle at center, rgba(20,150,255,0.05) 0%, transparent 70%);
        pointer-events: none;
      }

      /* Divider between slides */
      .slide + .slide { border-top: 1px solid rgba(255,255,255,0.04); }

      /* ── Section spacing ── */
      .dt-section { margin-bottom: 48px; }
      .dt-section-title    { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
      .dt-section-subtitle { font-size: 16px; color: var(--dt-gray-300); margin-bottom: 24px; }

      /* ── Heading / Typography ── */
      h1 {
        font-size: 52px; font-weight: 700; line-height: 1.1; margin-bottom: 12px;
        background: linear-gradient(135deg, var(--dt-white) 0%, var(--dt-gray-200) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      h1 .accent { -webkit-text-fill-color: var(--dt-blue); }

      h2 { font-size: 40px; font-weight: 700; margin-bottom: 8px; color: var(--dt-white); }
      h2 .accent { color: var(--dt-blue); }

      h3 { font-size: 22px; font-weight: 500; color: var(--dt-gray-300); margin-bottom: 32px; }

      .subtitle     { font-size: 22px; color: var(--dt-gray-300); line-height: 1.6; max-width: 700px; }
      .dt-paragraph { font-size: 18px; color: var(--dt-gray-300); line-height: 1.7; margin-bottom: 16px; }

      /* ── TitleBar ── */
      .dt-title-bar {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 24px; padding-bottom: 16px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      /* ── Chip ── */
      .dt-chip {
        display: inline-block;
        font-family: "DM Mono", monospace;
        font-size: 13px; text-transform: uppercase; letter-spacing: 2px;
        color: var(--dt-blue);
        border: 1px solid rgba(20,150,255,0.3);
        padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
      }
      .dt-chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }

      .dt-chip--primary  { color: var(--dt-blue);     border-color: rgba(20,150,255,0.3); }
      .dt-chip--success  { color: var(--dt-green);    border-color: rgba(115,190,40,0.3); }
      .dt-chip--warning  { color: var(--dt-orange);   border-color: rgba(245,132,31,0.3); }
      .dt-chip--critical { color: var(--dt-red);      border-color: rgba(239,68,68,0.3); }
      .dt-chip--neutral  { color: var(--dt-gray-300); border-color: rgba(156,163,175,0.3); }

      .dt-chip--accent.dt-chip--primary  { background: rgba(20,150,255,0.15);  border-color: transparent; }
      .dt-chip--accent.dt-chip--success  { background: rgba(115,190,40,0.15);  border-color: transparent; }
      .dt-chip--accent.dt-chip--warning  { background: rgba(245,132,31,0.15);  border-color: transparent; }
      .dt-chip--accent.dt-chip--critical { background: rgba(239,68,68,0.15);   border-color: transparent; }
      .dt-chip--accent.dt-chip--neutral  { background: rgba(156,163,175,0.15); border-color: transparent; }

      .dt-chip--condensed { font-size: 12px; padding: 2px 8px; }

      /* ── Grid ── */
      .dt-grid   { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 8px; }
      .dt-grid-2 { grid-template-columns: repeat(2, 1fr); }
      .dt-grid-3 { grid-template-columns: repeat(3, 1fr); }

      /* ── Flex ── */
      .dt-flex      { display: flex; gap: 16px; align-items: center; }
      .dt-flex-col  { flex-direction: column; align-items: stretch; }
      .dt-flex-wrap { flex-wrap: wrap; }

      /* ── Container → cards ── */
      .dt-container {
        background: var(--dt-card);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px; padding: 28px;
        transition: all 0.3s ease;
        position: relative; overflow: hidden;
      }
      .dt-container:hover {
        border-color: rgba(20,150,255,0.3);
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      }
      .dt-container::before {
        content: ""; position: absolute; top: 0; left: 0; right: 0;
        height: 3px; border-radius: 12px 12px 0 0;
      }
      .dt-container:nth-child(1)::before { background: var(--dt-blue); }
      .dt-container:nth-child(2)::before { background: var(--dt-green); }
      .dt-container:nth-child(3)::before { background: var(--dt-teal); }
      .dt-container:nth-child(4)::before { background: var(--dt-purple); }
      .dt-container:nth-child(5)::before { background: var(--dt-orange); }
      .dt-container:nth-child(6)::before { background: var(--dt-pink); }

      .dt-container--primary::before  { background: var(--dt-blue)     !important; }
      .dt-container--success::before  { background: var(--dt-green)    !important; }
      .dt-container--warning::before  { background: var(--dt-orange)   !important; }
      .dt-container--critical::before { background: var(--dt-red)      !important; }
      .dt-container--neutral::before  { background: var(--dt-gray-400) !important; }

      .dt-container-icon {
        width: 40px; height: 40px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; margin-bottom: 16px;
      }
      .dt-container:nth-child(1) .dt-container-icon { background: rgba(20,150,255,0.15); }
      .dt-container:nth-child(2) .dt-container-icon { background: rgba(115,190,40,0.15); }
      .dt-container:nth-child(3) .dt-container-icon { background: rgba(0,191,179,0.15); }
      .dt-container:nth-child(4) .dt-container-icon { background: rgba(180,160,255,0.15); }
      .dt-container:nth-child(5) .dt-container-icon { background: rgba(245,132,31,0.15); }
      .dt-container:nth-child(6) .dt-container-icon { background: rgba(238,121,162,0.15); }

      .dt-container-title { font-size: 19px; font-weight: 700; margin-bottom: 6px; color: var(--dt-white); }
      .dt-container-kind  { font-family: "DM Mono", monospace; font-size: 13px; color: var(--dt-blue); margin-bottom: 12px; }
      .dt-container-desc  { font-size: 16px; color: var(--dt-gray-300); line-height: 1.6; }

      /* ── SingleValue → KPI/stat tiles ── */
      .dt-single-value {
        background: var(--dt-card);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px; padding: 16px 20px; text-align: center;
      }
      .dt-single-value-number { font-size: 42px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
      .dt-single-value-label  { font-size: 13px; color: var(--dt-gray-400); text-transform: uppercase; letter-spacing: 1px; }

      /* ── ProgressBar ── */
      .dt-progress-bar  { width: 100%; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
      .dt-progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

      /* ── HealthIndicator ── */
      .dt-health     { display: inline-flex; align-items: center; gap: 8px; font-size: 15px; }
      .dt-health-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
      .dt-health-dot.ideal    { background: var(--dt-green); }
      .dt-health-dot.good     { background: var(--dt-blue); }
      .dt-health-dot.neutral  { background: var(--dt-gray-400); }
      .dt-health-dot.warning  { background: var(--dt-orange); }
      .dt-health-dot.critical { background: var(--dt-red); }

      /* ── MessageContainer ── */
      .dt-message {
        border-left: 3px solid var(--dt-blue);
        background: rgba(20,150,255,0.06);
        border-radius: 0 8px 8px 0; padding: 16px 20px;
        margin: 12px 0; font-size: 16px; color: var(--dt-gray-200);
      }
      .dt-message[data-variant="primary"]  { border-left-color: var(--dt-blue);   background: rgba(20,150,255,0.06); }
      .dt-message[data-variant="success"]  { border-left-color: var(--dt-green);  background: rgba(115,190,40,0.06); }
      .dt-message[data-variant="warning"]  { border-left-color: var(--dt-orange); background: rgba(245,132,31,0.06); }
      .dt-message[data-variant="critical"] { border-left-color: var(--dt-red);    background: rgba(239,68,68,0.06); }

      /* ── Insight Block ── */
      .dt-insight {
        padding: 14px 18px; border-radius: 10px;
        margin-bottom: 10px; border-left: 4px solid;
        font-size: 14px; line-height: 1.55;
      }
      .dt-insight--critical { border-color: var(--dt-red);    background: rgba(239,68,68,0.06); }
      .dt-insight--warning  { border-color: var(--dt-orange); background: rgba(245,132,31,0.06); }
      .dt-insight--info     { border-color: var(--dt-blue);   background: rgba(20,150,255,0.06); }
      .dt-insight--success  { border-color: var(--dt-green);  background: rgba(115,190,40,0.06); }
      .dt-insight .insight-severity    { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
      .dt-insight .insight-finding     { color: var(--dt-white); font-weight: 600; }
      .dt-insight .insight-consequence { color: var(--dt-gray-300); margin-top: 2px; }
      .dt-insight .insight-action      { color: var(--dt-blue); margin-top: 4px; font-size: 13px; }
      .dt-insight .dig-deeper          { font-size: 12px; color: var(--dt-teal); margin-top: 4px; font-style: italic; }
      .dt-insight .dig-deeper a        { color: var(--dt-teal); text-decoration: underline; }

      /* ── Notebook Link ── */
      .dt-notebook-link {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 8px 16px;
        background: rgba(20,150,255,0.08);
        border: 1px solid rgba(20,150,255,0.25);
        border-radius: 8px; color: var(--dt-blue);
        text-decoration: none; font-size: 13px;
        transition: background 0.2s, border-color 0.2s;
      }
      .dt-notebook-link:hover { background: rgba(20,150,255,0.15); border-color: var(--dt-blue); }
      .dt-notebook-link .notebook-icon  { font-size: 16px; }
      .dt-notebook-link .notebook-label { font-weight: 600; color: var(--dt-white); }
      .dt-notebook-link .notebook-desc  { color: var(--dt-gray-400); font-size: 12px; }

      /* ── Accordion ── */
      .dt-accordion {
        background: var(--dt-card);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px; margin-bottom: 8px; overflow: hidden;
      }
      .dt-accordion summary {
        padding: 16px 20px; cursor: pointer;
        font-weight: 700; font-size: 17px; color: var(--dt-white); list-style: none;
      }
      .dt-accordion summary::marker { display: none; }
      .dt-accordion summary::before { content: "▸ "; color: var(--dt-blue); }
      .dt-accordion[open] summary::before { content: "▾ "; }
      .dt-accordion .dt-accordion-body { padding: 0 20px 16px; font-size: 15px; color: var(--dt-gray-300); }

      /* ── Tabs ── */
      .dt-tabs { margin: 16px 0; }
      .dt-tab-list {
        display: flex; gap: 0;
        border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 20px;
      }
      .dt-tab-btn {
        background: none; border: none; border-bottom: 2px solid transparent;
        color: var(--dt-gray-400); font-family: inherit; font-size: 15px;
        font-weight: 500; padding: 10px 20px; cursor: pointer; transition: all 0.2s;
      }
      .dt-tab-btn:hover  { color: var(--dt-gray-200); }
      .dt-tab-btn.active { color: var(--dt-blue); border-bottom-color: var(--dt-blue); }
      .dt-tab-panel        { display: none; }
      .dt-tab-panel.active { display: block; }

      /* ── SimpleTable ── */
      .dt-table {
        width: 100%; border-collapse: collapse;
        background: var(--dt-card); border-radius: 12px; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.06);
      }
      .dt-table th {
        font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        color: var(--dt-gray-400); padding: 12px 16px; text-align: left;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .dt-table td {
        font-size: 15px; color: var(--dt-gray-200); padding: 12px 16px;
        border-bottom: 1px solid rgba(255,255,255,0.04);
      }
      .dt-table tr:last-child td { border-bottom: none; }

      /* ── Divider ── */
      .dt-divider { border: none; height: 1px; background: rgba(255,255,255,0.06); margin: 24px 0; }

      /* ── Blockquote ── */
      .dt-blockquote { border-left: 3px solid var(--dt-blue); padding: 12px 20px; color: var(--dt-gray-300); font-style: italic; margin: 16px 0; }

      /* ── CodeSnippet ── */
      code {
        font-family: "DM Mono", monospace;
        background: rgba(255,255,255,0.06); color: var(--dt-blue);
        padding: 2px 8px; border-radius: 4px; font-size: 0.85em;
      }
      .dt-code-snippet {
        background: var(--dt-card); border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px; padding: 24px; overflow-x: auto;
        font-size: 15px; line-height: 1.7;
      }
      .dt-code-snippet code { background: transparent; color: var(--dt-gray-200); padding: 0; font-size: inherit; }

      /* ── List ── */
      .dt-list { list-style: none; padding: 0; }
      .dt-list li {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 0; font-size: 15px; color: var(--dt-gray-200);
        border-bottom: 1px solid rgba(255,255,255,0.04);
      }
      .dt-list li::before { content: "→"; color: var(--dt-blue); font-weight: 700; }

      /* ── Architecture Diagram ── */
      .dt-arch-diagram {
        background: var(--dt-card); border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px; padding: 40px; margin-top: 16px;
        font-family: "DM Mono", monospace; font-size: 14px; line-height: 2;
        color: var(--dt-gray-200); position: relative; overflow: hidden;
      }
      .dt-arch-diagram::before {
        content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
        background: linear-gradient(90deg, var(--dt-blue), var(--dt-green), var(--dt-teal));
      }
      .dt-arch-row   { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 8px 0; flex-wrap: wrap; }
      .dt-arch-box   { padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; text-align: center; min-width: 140px; font-family: "DM Sans", sans-serif; }
      .dt-arch-box.user    { background: rgba(20,150,255,0.15);  color: var(--dt-blue);   border: 1px solid rgba(20,150,255,0.3); }
      .dt-arch-box.service { background: rgba(115,190,40,0.15);  color: var(--dt-green);  border: 1px solid rgba(115,190,40,0.3); }
      .dt-arch-box.infra   { background: rgba(0,191,179,0.15);   color: var(--dt-teal);   border: 1px solid rgba(0,191,179,0.3); }
      .dt-arch-box.policy  { background: rgba(180,160,255,0.15); color: var(--dt-purple); border: 1px solid rgba(180,160,255,0.3); }
      .dt-arch-arrow { color: var(--dt-gray-400); font-size: 20px; }
      .dt-arch-label { font-size: 11px; color: var(--dt-gray-400); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; text-align: center; }

      /* ── Color utilities ── */
      .color-blue   { color: var(--dt-blue); }
      .color-green  { color: var(--dt-green); }
      .color-teal   { color: var(--dt-teal); }
      .color-purple { color: var(--dt-purple); }
      .color-orange { color: var(--dt-orange); }
      .color-pink   { color: var(--dt-pink); }
      .color-red    { color: var(--dt-red); }

      /* ── Entrance animations (triggered by IntersectionObserver adding .in-view) ── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .anim-fade    { opacity: 0; }
      .anim-fade-d1 { opacity: 0; }
      .anim-fade-d2 { opacity: 0; }
      .anim-fade-d3 { opacity: 0; }
      .anim-fade-d4 { opacity: 0; }

      .in-view .anim-fade    { animation: fadeInUp 0.6s ease forwards; }
      .in-view .anim-fade-d1 { animation: fadeInUp 0.6s ease 0.1s forwards; }
      .in-view .anim-fade-d2 { animation: fadeInUp 0.6s ease 0.2s forwards; }
      .in-view .anim-fade-d3 { animation: fadeInUp 0.6s ease 0.3s forwards; }
      .in-view .anim-fade-d4 { animation: fadeInUp 0.6s ease 0.4s forwards; }

      /* ── Navigation chrome ── */
      /* Vertical progress rail (right-center) */
      .progress {
        position: fixed;
        right: 20px; top: 50%;
        transform: translateY(-50%);
        display: flex; flex-direction: column; gap: 8px; align-items: center;
        z-index: 100;
      }
      .progress-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--dt-gray-500); transition: all 0.3s ease; cursor: pointer;
      }
      .progress-dot.active { background: var(--dt-blue); height: 24px; border-radius: 4px; }

      /* Slide counter (bottom-center) */
      .slide-counter {
        position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
        font-family: "DM Mono", monospace; font-size: 13px;
        color: var(--dt-gray-400); z-index: 100;
      }

      /* Scroll nav buttons (bottom-right, ↑/↓) */
      .scroll-nav {
        position: fixed; bottom: 16px; right: 40px;
        display: flex; gap: 8px; z-index: 100;
      }
      .scroll-nav button {
        width: 44px; height: 44px; border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.1);
        background: var(--dt-card); color: var(--dt-white);
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        font-size: 18px; transition: all 0.2s ease;
      }
      .scroll-nav button:hover    { background: var(--dt-blue); border-color: var(--dt-blue); }
      .scroll-nav button:disabled { opacity: 0.2; cursor: not-allowed; }
      .scroll-nav button:disabled:hover { background: var(--dt-card); border-color: rgba(255,255,255,0.1); }

      /* ── Print ── */
      @media print {
        html { scroll-snap-type: none !important; }
        body { overflow: visible !important; }
        .dt-app-header { position: relative; }
        .progress, .scroll-nav, .slide-counter { display: none !important; }
        .slide {
          min-height: 100vh;
          page-break-after: always; break-after: page;
          overflow: visible;
        }
        .anim-fade,
        .anim-fade-d1,
        .anim-fade-d2,
        .anim-fade-d3,
        .anim-fade-d4 { opacity: 1 !important; animation: none !important; }
      }
    </style>
  </head>

          <div class="dt-grid anim-fade-d1">
            <div class="dt-single-value">

            <div class="dt-single-value">

                <td><!-- REPLACE: Item A --></td>

    <!-- Navigation chrome -->
    <div class="progress" id="progress"></div>
    <div class="slide-counter" id="counter"></div>
    <div class="scroll-nav">
      <button id="prev-btn" title="Scroll up (↑)" onclick="scrollToSlide(currentSlide - 1)">&#8593;</button>
      <button id="next-btn" title="Scroll down (↓)" onclick="scrollToSlide(currentSlide + 1)">&#8595;</button>
    </div>

    <script>
      "use strict";

      // Remove no-js class
      document.body.classList.remove("no-js");

      const slides = Array.from(document.querySelectorAll(".slide"));
      const total  = slides.length;
      let currentSlide = 0;

      // ── Progress dots ──
      const progressEl = document.getElementById("progress");
      const counterEl  = document.getElementById("counter");

      for (let i = 0; i < total; i++) {
        const dot = document.createElement("div");
        dot.className = "progress-dot" + (i === 0 ? " active" : "");
        dot.title = "Go to section " + (i + 1);
        dot.onclick = () => scrollToSlide(i);
        progressEl.appendChild(dot);
      }

      function updateNav(index) {
        currentSlide = index;
        document.querySelectorAll(".progress-dot")
          .forEach((d, i) => d.classList.toggle("active", i === index));
        counterEl.textContent = (index + 1) + " / " + total;
        document.getElementById("prev-btn").disabled = index === 0;
        document.getElementById("next-btn").disabled = index === total - 1;
      }

      function scrollToSlide(index) {
        if (index < 0 || index >= total) return;
        slides[index].scrollIntoView({ behavior: "smooth", block: "start" });
      }

      // ── IntersectionObserver: entrance animations + active tracking ──
      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("in-view");
              const idx = slides.indexOf(entry.target);
              if (idx !== -1) updateNav(idx);
            }
          });
        },
        { threshold: 0.3 }
      );

      slides.forEach((slide) => io.observe(slide));

      // Initialise nav state immediately
      updateNav(0);

      // ── Keyboard navigation ──
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowDown" || e.key === " ") { e.preventDefault(); scrollToSlide(currentSlide + 1); }
        if (e.key === "ArrowUp")                    { e.preventDefault(); scrollToSlide(currentSlide - 1); }
        if (e.key === "Home")                       { e.preventDefault(); scrollToSlide(0); }
        if (e.key === "End")                        { e.preventDefault(); scrollToSlide(total - 1); }
      });

      // ── Tab switching ──
      document.querySelectorAll(".dt-tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const group = btn.closest(".dt-tabs");
          group.querySelectorAll(".dt-tab-btn").forEach((b) => b.classList.remove("active"));
          group.querySelectorAll(".dt-tab-panel").forEach((p) => p.classList.remove("active"));
          btn.classList.add("active");
          group.querySelector("#" + btn.dataset.panel).classList.add("active");
        });
      });
    </script>
